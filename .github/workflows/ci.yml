name: CI/CD

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  CONFIGURATION: Release
  SOLUTION_PATH: PicoBusX.slnx
  WEB_PROJECT_PATH: src/PicoBusX.Web/PicoBusX.Web.csproj
  CONTAINER_RUNTIME: linux-x64

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # Build the actual solution so CI follows the same project graph as local development.
      - name: Restore solution
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build solution
        run: dotnet build ${{ env.SOLUTION_PATH }} --configuration ${{ env.CONFIGURATION }} --no-restore -p:ContinuousIntegrationBuild=true

      - name: Test web project
        run: dotnet test tests/PicoBusX.Web.Tests/PicoBusX.Web.Tests.csproj --configuration ${{ env.CONFIGURATION }} --no-build --logger "trx;LogFileName=web-tests.trx" --results-directory TestResults

      - name: Test AppHost project
        run: dotnet test tests/PicoBusX.AppHost.Tests/PicoBusX.AppHost.Tests.csproj --configuration ${{ env.CONFIGURATION }} --no-build --logger "trx;LogFileName=apphost-tests.trx" --results-directory TestResults

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults/
          retention-days: 7

  publish-web-container:
    name: Publish Web Container
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # This job starts from a clean workspace, so restore with the same RID used by PublishContainer.
      - name: Restore web project for container runtime
        run: dotnet restore ${{ env.WEB_PROJECT_PATH }} --runtime ${{ env.CONTAINER_RUNTIME }}

      - name: Compute image metadata
        id: image
        shell: bash
        run: |
          OWNER_LOWER="${GITHUB_REPOSITORY_OWNER,,}"
          SHORT_SHA="${GITHUB_SHA::7}"

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAGS="${GITHUB_REF_NAME} sha-${SHORT_SHA}"
          elif [[ "${GITHUB_REF}" == "refs/heads/master" ]]; then
            TAGS="master latest sha-${SHORT_SHA}"
          else
            TAGS="main latest sha-${SHORT_SHA}"
          fi

          echo "repository=${OWNER_LOWER}/picobusx" >> "$GITHUB_OUTPUT"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      # dotnet PublishContainer does the image build/push; login only provides GHCR credentials.
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish container image with .NET SDK
        shell: bash
        env:
          IMAGE_REPOSITORY: ${{ steps.image.outputs.repository }}
          IMAGE_TAGS: ${{ steps.image.outputs.tags }}
        run: |
          # Publish once per tag because the CLI parsing for semicolon-delimited ContainerImageTags is brittle in CI shells.
          for image_tag in ${IMAGE_TAGS}; do
            dotnet publish ${{ env.WEB_PROJECT_PATH }} \
              --configuration ${{ env.CONFIGURATION }} \
              --runtime ${{ env.CONTAINER_RUNTIME }} \
              --no-restore \
              /t:PublishContainer \
              -p:ContinuousIntegrationBuild=true \
              -p:EnableSdkContainerSupport=true \
              -p:ContainerRegistry=ghcr.io \
              "-p:ContainerRepository=${IMAGE_REPOSITORY}" \
              "-p:ContainerImageTags=${image_tag}"
          done
